stages:
  - lint
  - deploy

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

lint:
  stage: lint
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker compose config
  tags:
    - docker

deploy:
  stage: deploy
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker compose up -d
  environment:
    name: production
  only:
    - main
  tags:
    - docker
